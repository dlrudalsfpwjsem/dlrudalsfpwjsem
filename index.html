<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Engineering Lexicon - 공학 전공 표현 마스터</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #eceff1, #cfd8dc);
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #263238;
    }

    .container {
      width: min(950px, 92%);
      margin: 40px auto;
      background: #ffffff;
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 30px;
      color: #37474f;
      letter-spacing: -0.5px;
    }

    .subtitle {
      text-align: center;
      color: #607d8b;
      margin-bottom: 32px;
      font-size: 15px;
    }

    .auth-box {
      max-width: 420px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input, textarea {
      height: 48px;
      padding: 0 16px;
      border: 1px solid #b0bec5;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      background: #f8f9fa;
    }

    input:focus, textarea:focus {
      border-color: #1e88e5;
      box-shadow: 0 0 0 3px rgba(30, 136, 229, 0.15);
      background: #ffffff;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 0 18px;
      height: 48px;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
      transform: none;
    }

    .login-btn { background: #37474f; color: white; }
    .signup-btn { background: #78909c; color: white; }
    .logout-btn { background: #cfd8dc; color: #37474f; }
    .add-btn { background: #00796b; color: white; width: 100%; }
    .ai-btn { background: #0288d1; color: white; }
    .refresh-btn { background: #546e7a; color: white; margin-bottom: 20px; }
    .tts-btn { background: #00897b; color: white; padding: 0 12px; height: 36px; font-size: 13px; }
    .edit-btn { background: #ffb300; color: #263238; padding: 0 12px; height: 36px; font-size: 13px; }
    .delete-btn { background: #d32f2f; color: white; padding: 0 12px; height: 36px; font-size: 13px; }
    .save-btn { background: #00796b; color: white; }
    .cancel-btn { background: #b0bec5; color: white; }

    .form-box {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 24px;
      padding: 24px;
      background: #f1f5f7;
      border-radius: 14px;
      border: 1px solid #cfd8dc;
    }

    .form-row {
      display: flex;
      gap: 12px;
    }

    .form-row input { flex: 1; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding: 16px;
      border-radius: 12px;
      background: #eceff1;
      border: 1px solid #b0bec5;
    }

    .user-info {
      font-size: 14px;
      color: #37474f;
    }

    .status {
      min-height: 24px;
      margin-bottom: 16px;
      color: #455a64;
      font-size: 14px;
      font-family: monospace;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 20px;
      border-radius: 14px;
      background: #ffffff;
      border: 1px solid #cfd8dc;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }

    .item-title {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 700;
      color: #0288d1;
    }

    .item-content {
      margin: 0;
      color: #37474f;
      line-height: 1.6;
      word-break: break-all;
      font-size: 15px;
    }

    .item-date {
      margin-top: 10px;
      font-size: 12px;
      color: #90a4ae;
    }

    .item-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .edit-box {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .empty {
      text-align: center;
      padding: 40px;
      color: #78909c;
      background: #f8f9fa;
      border-radius: 14px;
      border: 1px dashed #b0bec5;
    }

    .hidden {
      display: none;
    }

    .notice {
      max-width: 420px;
      margin: 20px auto 0;
      padding: 14px;
      border-radius: 10px;
      background: #fff9c4;
      color: #5d4037;
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      .item { grid-template-columns: 1fr; }
      .form-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI Engineering Lexicon 🛠️</h1>
    <div class="subtitle">공학 연구원 및 학생을 위한 전공 용어 및 논문 영어 표현 마스터 솔루션</div>

    <section id="authSection">
      <div class="auth-box">
        <input id="emailInput" type="email" placeholder="공학도 이메일 계정" />
        <input id="passwordInput" type="password" placeholder="비밀번호 (6자리 이상)" />
        <button class="login-btn" id="loginBtn">시스템 로그인</button>
        <button class="signup-btn" id="signupBtn">연구원 등록 (회원가입)</button>
      </div>
      <div class="notice">
        ⚡ 처음 방문하셨다면 이메일/패스워드 입력 후 <strong>연구원 등록</strong>을 눌러 데이터베이스 공간을 생성하세요.
      </div>
    </section>

    <section id="mainSection" class="hidden">
      <div class="top-bar">
        <div class="user-info">
          접속 중인 연구원: <strong id="userEmail"></strong>
        </div>
        <button class="logout-btn" id="logoutBtn">로그아웃</button>
      </div>

      <div class="form-box">
        <div class="form-row">
          <input id="titleInput" type="text" placeholder="공학 용어/개념/수식 이름 입력 (예: 고유값 분해, Navier-Stokes)" />
        </div>
        <div class="form-row">
          <input id="contentInput" type="text" placeholder="공학적 정의 또는 학회 논문용 핵심 영어 표현" style="flex: 2;" />
          <button class="ai-btn" id="aiBtn">🤖 AI 공학 해석</button>
        </div>
        <button class="add-btn" id="addBtn">나만의 공학 노트에 기록 저장</button>
      </div>

      <button class="refresh-btn" id="refreshBtn">중앙 데이터 서버 동기화</button>
      <div id="status" class="status"></div>
      <div id="dataList" class="list"></div>
    </section>
  </div>

  <audio id="audioPlayer" class="hidden"></audio>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import {
      getDatabase,
      ref,
      push,
      set,
      update,
      remove,
      onValue,
      off
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

    // Firebase 구성 설정 
    const firebaseConfig = {
      apiKey: "AIzaSyDbrZCoHQMV_YLL6K40m8ckxr4CGjpWNfw",
      authDomain: "test-92919.firebaseapp.com",
      databaseURL: "https://test-92919-default-rtdb.firebaseio.com",
      projectId: "test-92919",
      storageBucket: "test-92919.firebasestorage.app",
      messagingSenderId: "835502977861",
      appId: "1:835502977861:web:af812f4aa975ffbf0d442c",
      measurementId: "G-KGMKCVRYYQ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);

    // Google Apps Script 웹앱 URL 
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw0tRYMVwFWOzcVF-W2FIVmEHY_K6FDibEbT4YjewzJcwBPTvs6BA3f2KR9pUBiFA2nbA/exec';

    const authSection = document.getElementById('authSection');
    const mainSection = document.getElementById('mainSection');
    const emailInput = document.getElementById('emailInput');
    const passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn');
    const signupBtn = document.getElementById('signupBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const userEmail = document.getElementById('userEmail');
    
    const titleInput = document.getElementById('titleInput');
    const contentInput = document.getElementById('contentInput');
    const addBtn = document.getElementById('addBtn');
    const aiBtn = document.getElementById('aiBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const dataList = document.getElementById('dataList');
    const statusBox = document.getElementById('status');
    const audioPlayer = document.getElementById('audioPlayer');

    let currentUser = null;
    let currentItemsRef = null;

    function setStatus(message) {
      statusBox.textContent = `[SYSTEM]: ${message}`;
    }

    function getEmailAndPassword() {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();
      if (!email || !password) {
        alert('이메일과 비밀번호를 모두 입력해주세요.');
        return null;
      }
      return { email, password };
    }

    // --- Authentication ---
    signupBtn.addEventListener('click', async () => {
      const account = getEmailAndPassword();
      if (!account) return;
      try {
        await createUserWithEmailAndPassword(auth, account.email, account.password);
        alert('연구원 등록 완료. 공학 노트를 활성화합니다.');
      } catch (error) {
        alert(getKoreanErrorMessage(error.code));
      }
    });

    loginBtn.addEventListener('click', async () => {
      const account = getEmailAndPassword();
      if (!account) return;
      try {
        await signInWithEmailAndPassword(auth, account.email, account.password);
      } catch (error) {
        alert(getKoreanErrorMessage(error.code));
      }
    });

    logoutBtn.addEventListener('click', async () => {
      try { await signOut(auth); } catch (error) { alert('로그아웃 실패'); }
    });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        showMainPage(user);
        startRealtimeDataListener(user.uid);
      } else {
        currentUser = null;
        showAuthPage();
        stopRealtimeDataListener();
      }
    });

    function showMainPage(user) {
      authSection.classList.add('hidden');
      mainSection.classList.remove('hidden');
      userEmail.textContent = user.email;
    }

    function showAuthPage() {
      authSection.classList.remove('hidden');
      mainSection.classList.add('hidden');
      dataList.innerHTML = '';
    }

    // --- Realtime Database 연동 ---
    function startRealtimeDataListener(uid) {
      stopRealtimeDataListener();
      setStatus('데이터베이스 파이프라인 연결 중...');
      currentItemsRef = ref(database, `users/${uid}/engineering_notes`);

      onValue(currentItemsRef, (snapshot) => {
        renderData(snapshot.val());
        setStatus('서버 데이터와 로컬 노트가 실시간 동기화되었습니다.');
      }, (error) => {
        setStatus('데이터 연동 오류 발생.');
      });
    }

    function stopRealtimeDataListener() {
      if (currentItemsRef) { off(currentItemsRef); currentItemsRef = null; }
    }

    // --- 생성형 인공지능 API 연동 (공학용 한글/영어 분리 최적화) ---
    aiBtn.addEventListener('click', async () => {
      const term = titleInput.value.trim();
      if (!term) {
        alert('해석을 원하는 공학 용어나 수식 이름을 [용어/개념/수식 이름] 칸에 먼저 입력하세요.');
        return;
      }

      try {
        aiBtn.disabled = true;
        aiBtn.textContent = '⚡ 해석 중...';
        setStatus('AI가 공학 전공 데이터베이스 및 글로벌 최신 논문을 분석 중입니다...');

        // 💡 프롬프트를 완전히 구조화하여 한글과 영어 출력물이 뒤섞이지 않게 고정했습니다.
        const engineeringPrompt = `공학(Engineering) 관점에서 다음 용어에 대해 아래의 [출력 조건]을 완벽히 지켜서 답변해줘.

용어: "${term}"

[출력 조건]
1. 첫 번째 줄은 반드시 해당 용어의 100% 한국어 핵심 기술 정의를 적어줘. (영어를 섞지 말 것)
2. 두 번째 줄은 이 개념이 실제 국제 학술 논문(IEEE, Nature 등)에 쓰일 만한 고급 학술 영어 예문(Academic English Sentence)을 단 한 문장으로 적어줘.
3. 마크다운 서식(#, *, - 등)이나 인사말은 일절 생략하고 오직 두 줄의 텍스트만 출력해줘.

[출력 양식 예시]
고유값 분해는 행렬을 고유값과 고유벡터의 차원으로 분해하여 다차원 데이터를 분석하는 선형대수학 기법이다.
Eigenvalue decomposition serves as a fundamental mathematical framework to simplify complex matrix operations in high-dimensional data analysis.`;

        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ question: engineeringPrompt, type: "chat" })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error);

        // 결과창 내에 줄바꿈이 깔끔하게 표시되도록 처리
        contentInput.value = data.answer.replace(/"/g, "").trim(); 
        setStatus('AI 공학 해석 로드 완료! 노트를 영구 저장하려면 추가 버튼을 누르세요.');
      } catch (error) {
        alert('AI 분석 실패: ' + error.message);
      } finally {
        aiBtn.disabled = false;
        aiBtn.textContent = '🤖 AI 공학 해석';
      }
    });

    // --- CRUD 연동 ---
    addBtn.addEventListener('click', async () => {
      if (!currentUser) return;
      const title = titleInput.value.trim();
      const content = contentInput.value.trim();
      if (!title || !content) { alert('용어와 상세 기술 내용이 작성되어야 저장이 가능합니다.'); return; }

      try {
        const itemsRef = ref(database, `users/${currentUser.uid}/engineering_notes`);
        await set(push(itemsRef), { title, content, createdAt: new Date().toLocaleString('ko-KR') });
        titleInput.value = ''; contentInput.value = '';
      } catch (error) { alert('저장 실패'); }
    });

    window.deleteData = async function(id) {
      if (!currentUser || !confirm('이 공학 레코드를 삭제하시겠습니까?')) return;
      try { await remove(ref(database, `users/${currentUser.uid}/engineering_notes/${id}`)); } catch (error) { alert('삭제 실패'); }
    };

    window.showEditForm = function(id, title, content) {
      const itemBox = document.getElementById(`item-${id}`);
      itemBox.innerHTML = `
        <div class="edit-box">
          <input id="edit-title-${id}" type="text" value="${title}" />
          <input id="edit-content-${id}" type="text" value="${content}" />
          <div style="display:flex; gap:6px; justify-content:flex-end;">
            <button class="save-btn" onclick="updateData('${id}')">데이터 업데이트</button>
            <button class="cancel-btn" onclick="refreshBtn.click()">변경 취소</button>
          </div>
        </div>
      `;
    };

    window.updateData = async function(id) {
      const editTitle = document.getElementById(`edit-title-${id}`).value.trim();
      const editContent = document.getElementById(`edit-content-${id}`).value.trim();
      if (!editTitle || !editContent) return;
      try {
        await update(ref(database, `users/${currentUser.uid}/engineering_notes/${id}`), {
          title: editTitle, content: editContent, updatedAt: new Date().toLocaleString('ko-KR')
        });
      } catch (error) { alert('수정 실패'); }
    };

    // --- OpenAI Speech API 활용 TTS 기술 ---
    window.playTTS = async function(btn, text) {
      try {
        btn.disabled = true;
        btn.textContent = '🧬 로딩';
        setStatus('글로벌 학회 발표용 오디오 스트림 합성 중...');

        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ type: "tts", text: text, voice: "nova", model: "tts-1" })
        });

        const data = await response.json();
        if (data.error) throw new Error(data.error);

        audioPlayer.src = "data:audio/mp3;base64," + data.audio;
        audioPlayer.play();
        setStatus('학술 오디오 스트리밍 출력 중.. 발음을 청취하고 따라 하세요.');
      } catch (error) {
        alert('TTS 오디오 출력 실패: ' + error.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '🔊 논문 리딩';
      }
    };

    function renderData(data) {
      dataList.innerHTML = '';
      if (!data) {
        dataList.innerHTML = '<div class="empty">기록된 공학 용어가 없습니다. 상단 AI 해석을 통해 전공 데이터베이스를 채워보세요.</div>';
        return;
      }

      Object.entries(data).reverse().forEach(([id, item]) => {
        const div = document.createElement('div');
        div.className = 'item';
        div.id = `item-${id}`;

        const escapedTitle = escapeForAttribute(item.title || '');
        const escapedContent = escapeForAttribute(item.content || '');

        div.innerHTML = `
          <div>
            <p class="item-title">📘 Concept: ${escapeHTML(item.title || '')}</p>
            <p class="item-content"><strong>🧬 Tech Info:</strong> ${escapeHTML(item.content || '')}</p>
            <div class="item-date">기록 및 검증 시점: ${item.createdAt || '-'} ${item.updatedAt ? ` (수정 승인됨)` : ''}</div>
          </div>
          <div class="item-actions">
            <button class="tts-btn" onclick="playTTS(this, '${escapedContent}')">🔊 논문 리딩</button>
            <button class="edit-btn" onclick="showEditForm('${id}', '${escapedTitle}', '${escapedContent}')">수정</button>
            <button class="delete-btn" onclick="deleteData('${id}')">삭제</button>
          </div>
        `;
        dataList.appendChild(div);
      });
    }

    refreshBtn.addEventListener('click', () => { if (currentUser) startRealtimeDataListener(currentUser.uid); });
    function escapeHTML(text) { return String(text).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#039;'); }
    function escapeForAttribute(text) { return escapeHTML(text).replaceAll('`', '&#096;'); }
    function getKoreanErrorMessage(code) {
      if (code === 'auth/weak-password') return '안전성을 위해 비밀번호를 6자리 이상으로 입력하십시오.';
      if (code === 'auth/invalid-credential') return '계정 정보가 일치하지 않습니다.';
      return `인증 오류 코드: ${code}`;
    }
  </script>
</body>
</html>
